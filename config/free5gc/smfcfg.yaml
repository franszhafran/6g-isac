info:
  version: 1.0.7
  description: SMF initial local configuration

configuration:
  smfName: SMF
  sbi:
    scheme: http
    registerIPv4: 172.22.0.7
    bindingIPv4: 0.0.0.0
    port: 8000
  serviceNameList:
    - nsmf-pdusession
    - nsmf-event-exposure
    - nsmf-oam
  snssaiInfos:
    - sNssai:
        sst: 1
        sd: "010203"
      dnnInfos:
        - dnn: internet
          dns:
            ipv4: 8.8.8.8
            ipv6: ""
  pfcp:
    listenAddr: 172.22.0.7
    externalAddr: 172.22.0.7
    nodeID: 172.22.0.7
    retransTimeout: 1s
    maxRetrans: 3
  userplaneInformation:
    upNodes:
      gNB1:
        type: AN
      UPF:
        type: UPF
        nodeID: 172.22.0.8
        addr: 172.22.0.8
        sNssaiUpfInfos:
          - sNssai:
              sst: 1
              sd: "010203"
            dnnUpfInfoList:
              - dnn: internet
                pools:
                  - cidr: 10.60.0.0/16
                staticPools: []
        interfaces:
          - interfaceType: N3
            endpoints:
              - 172.22.0.8
            networkInstances:
              - internet
    links:
      - A: gNB1
        B: UPF
  locality: area1
  nrfUri: http://172.22.0.12:8000
  urrPeriod: 10
  urrThreshold: 1000
  t3591:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3
  t3592:
    enable: true
    expireTime: 16s
    maxRetryTimes: 3

logger:
  enable: true
  level: info
  reportCaller: false
