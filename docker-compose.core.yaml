version: "3.8"

x-free5gc: &free5gc-base
  build:
    context: .
    dockerfile: build/free5gc/Dockerfile
  restart: unless-stopped
  networks:
    - isac_net

services:

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    hostname: mongodb
    volumes:
      - mongodbdata:/data/db
    networks:
      isac_net:
        ipv4_address: 172.22.0.2
    restart: unless-stopped

  nrf:
    <<: *free5gc-base
    container_name: nrf
    hostname: nrf
    environment:
      - COMPONENT_NAME=nrf
    volumes:
      - ./config/free5gc/nrfcfg.yaml:/free5gc/config/nrfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.12
    depends_on:
      - mongodb

  ausf:
    <<: *free5gc-base
    container_name: ausf
    hostname: ausf
    environment:
      - COMPONENT_NAME=ausf
    volumes:
      - ./config/free5gc/ausfcfg.yaml:/free5gc/config/ausfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.11
    depends_on:
      - nrf

  udr:
    <<: *free5gc-base
    container_name: udr
    hostname: udr
    environment:
      - COMPONENT_NAME=udr
    volumes:
      - ./config/free5gc/udrcfg.yaml:/free5gc/config/udrcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.14
    depends_on:
      - mongodb
      - nrf

  udm:
    <<: *free5gc-base
    container_name: udm
    hostname: udm
    environment:
      - COMPONENT_NAME=udm
    volumes:
      - ./config/free5gc/udmcfg.yaml:/free5gc/config/udmcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.13
    depends_on:
      - nrf

  pcf:
    <<: *free5gc-base
    container_name: pcf
    hostname: pcf
    environment:
      - COMPONENT_NAME=pcf
    volumes:
      - ./config/free5gc/pcfcfg.yaml:/free5gc/config/pcfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.27
    depends_on:
      - mongodb
      - nrf

  nssf:
    <<: *free5gc-base
    container_name: nssf
    hostname: nssf
    environment:
      - COMPONENT_NAME=nssf
    volumes:
      - ./config/free5gc/nssfcfg.yaml:/free5gc/config/nssfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.28
    depends_on:
      - nrf

  amf:
    <<: *free5gc-base
    container_name: amf
    hostname: amf
    environment:
      - COMPONENT_NAME=amf
    volumes:
      - ./config/free5gc/amfcfg.yaml:/free5gc/config/amfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.10
    depends_on:
      - nrf

  smf:
    <<: *free5gc-base
    container_name: smf
    hostname: smf
    environment:
      - COMPONENT_NAME=smf
    volumes:
      - ./config/free5gc/smfcfg.yaml:/free5gc/config/smfcfg.yaml:ro
    networks:
      isac_net:
        ipv4_address: 172.22.0.7
    depends_on:
      - nrf

  upf:
    <<: *free5gc-base
    container_name: upf
    hostname: upf
    environment:
      - COMPONENT_NAME=upf
    volumes:
      - ./config/free5gc/upfcfg.yaml:/free5gc/config/upfcfg.yaml:ro
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    networks:
      isac_net:
        ipv4_address: 172.22.0.8
    depends_on:
      - smf

  webconsole:
    <<: *free5gc-base
    container_name: webconsole
    hostname: webconsole
    environment:
      - COMPONENT_NAME=webconsole
    volumes:
      - ./config/free5gc/webuicfg.yaml:/free5gc/config/webuicfg.yaml:ro
    ports:
      - "${WEBCONSOLE_PORT:-5000}:5000"
    networks:
      isac_net:
        ipv4_address: 172.22.0.26
    depends_on:
      - mongodb
      - nrf

volumes:
  mongodbdata:

networks:
  isac_net:
    name: isac_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
